name: sushi
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  firebase_core: ^3.10.1
  firebase_auth: ^5.4.1
  cloud_firestore: ^5.6.0
  firebase_storage: ^12.4.10

  google_sign_in: ^7.2.0
  flutter_facebook_auth: ^7.1.7

  google_maps_flutter: ^2.17.1
  geolocator: ^13.0.0
  geocoding: ^3.0.0

  cached_network_image: ^3.4.1
  connectivity_plus: ^6.1.1
  flutter_bloc: ^9.1.0
  bloc: ^9.1.0
  equatable: ^2.0.7
  sqflite: ^2.4.1
  path: ^1.9.1
  intl: ^0.20.2
  local_auth: ^2.1.8
  image_picker: ^1.0.7
  shared_preferences: ^2.2.3
  flutter_localizations:
    sdk: flutter
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/layer_2w.png"
  adaptive_icon_background: "#FFFFFF"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/images/
